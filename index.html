<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR and AR Example with A-Frame</title>

    <!-- A-Frame library -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js for AR functionality -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-ar.js"></script>

    <!-- WebXR support (for VR) -->
    <script src="https://unpkg.com/aframe-xr-component@1.0.0/dist/aframe-xr-component.js"></script>

  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded vr-mode-ui arjs="sourceType: webcam; debugUIEnabled: false;">

      <!-- VR/AR Environment -->
      <!-- The scene's background comes from the camera when in AR mode -->

      <!-- A simple 3D object (Box) that will be visible in AR/VR -->
      <a-box position="0 1.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>

      <!-- The camera will automatically switch between AR and VR mode -->
      <a-camera></a-camera>
    </a-scene>

    <p style="position: fixed; bottom: 20px; left: 20px; font-size: 16px; color: white;">
      Use the browser's AR/VR functionality for Meta Quest 3.
    </p>
  </body>
</html>
