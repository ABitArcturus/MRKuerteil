<!--

Als letzte Aufgabe sollen Sie nun bitte selbstständig eine A-Frame-Szene entwickeln,
die mindestens fünf Objekte enthält,
x dabei mindestens eines eingelesen wird
x und eines texturiert ist,
x mindestens eine Lichtquelle soll in der Szene existieren
x und Schattenwurf generieren.
Dies sollte insgesamt nicht so schwierig sein, wenn Sie die Doku zu A-Frame gelesen haben.  
-->

<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Hello, World! - A-Frame</title>
  <meta name="description" content="Hello, World! - A-Frame">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
  <!--   <a-scene shadow="type: pcfsoft">
 -->
  <a-scene>


    <a-assets>
      <img id="grassTexture" src="assets/grass.jpg">
      <a-asset-item id="male3DModel" src="/assets/FinalBaseMesh.obj"></a-asset-item>
      <!-- downloaded for free from: https://free3d.com/3d-model/male-base-mesh-6682.html -->
    </a-assets>
    <!-- position xyz x:(- to the left, + to the right), y: upwards, z: away from the camera (- front of the cam, + behind the cam) -->
    <!-- rotation xyz x: Pitch, rotation X-axis, y:Yaw, rotation Y-axis, z: Roll, rotation Z-axis.-->

    <!-- texture object -->
    <a-plane id="textureMe" position="0 0 -5" rotation="-90 0 0" width="10" height="10" material="src: #grassTexture"
      shadow="receive:true"></a-plane>

    <!--  <a-sky color="#6fb9e8"></a-sky> -->

    <!-- imported object -->
    <a-entity obj-model="obj: #male3DModel" scale="0.1 0.1 0.1" position="-3 0 -5" rotation="0 45"
      shadow="receive: true"></a-entity>

    <a-box position="0 1 -4" rotation="0 45 0" color="#669999" shadow="receive: true"></a-box>

    <a-sphere color="yellow" radius="0.5" position="2.5 1 -4" shadow="receive: true"
      animation="property: position; to: 2.5 0.5 -4; dur: 300; easing: linear; loop: true; dir: alternate"></a-sphere>

    <!-- light source -->
    <a-light type="directional" light="castShadow:true;" position="-3 6 -6" intensity="0.5"></a-light>

    <!-- brightening of the scene to prevent complete darkness -->
    <a-light type="ambient" color="#445451" intensity="1"></a-light>

    <a-entity text="value: I'm the 5th object;" position="1.5 2 -1"></a-entity>

  </a-scene>
</body>

</html>
